                                                            <div className="font-display text-3xl font-black text-brand-500">{gbp(ph.price)}</div>
                                                            <span className="bg-brand-500 text-white font-black px-5 py-2.5 rounded-xl text-sm shadow">Buy →</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </section>
                            {/* SELL BANNER */}
                            <section className="py-16 bg-gray-50 px-4">
                                <div className="max-w-5xl mx-auto">
                                    <div className="bg-gray-900 rounded-3xl p-8 md:p-12 flex flex-col md:flex-row items-center justify-between gap-8 relative overflow-hidden shadow-xl">
                                        <div className="absolute top-0 right-0 w-96 h-96 opacity-[0.06]"
                                            style={{ background: "radial-gradient(circle, #f97316 0%, transparent 70%)", transform: "translate(30%, -30%)" }}></div>
                                        <div className="relative text-center md:text-left">
                                            <div className="text-brand-400 font-bold text-xs uppercase tracking-widest mb-2">💸 Top Prices Paid</div>
                                            <h2 className="font-display text-4xl md:text-5xl font-black text-white mb-3">We Buy Old Phones</h2>
                                            <p className="text-gray-400 font-medium max-w-md leading-relaxed">Upgrading? Need quick cash? We pay top market rates for old or broken devices — instant offer, no hassle.</p>
                                        </div>
                                        <button onClick={() => setView('sell')}
                                            className="relative flex-shrink-0 bg-white text-gray-900 font-display font-black text-xl px-8 py-4 rounded-2xl hover:bg-gray-100 transition-colors whitespace-nowrap shadow-lg">
                                            Get Cash Quote →
                                        </button>
                                    </div>
                                </div>
                            </section>
                            {/* VAPE */}
                            <section className="py-16 bg-white border-t border-gray-100 px-4">
                                <div className="max-w-5xl mx-auto">
                                    <div className="text-center mb-10">
                                        <h2 className="font-display text-4xl md:text-5xl font-black text-gray-900 mb-2">While We Fix Your Phone...</h2>
                                        <p className="text-gray-400 font-medium">Browse our in-store vape selection</p>
                                    </div>
                                    <div className="grid md:grid-cols-2 gap-6">
                                        <div className="bg-gray-50 p-8 rounded-3xl border border-gray-100 flex flex-col justify-center">
                                            <div className="w-14 h-14 bg-brand-50 text-brand-500 rounded-xl flex items-center justify-center text-2xl mb-5">
                                                <i className="fas fa-smoking"></i>
                                            </div>
                                            <h3 className="font-display text-3xl font-black text-gray-900 mb-3">Premium Vapes</h3>
                                            <p className="text-gray-500 font-medium leading-relaxed">Huge selection of disposables, e-liquids, coils, and kits. Something for every taste and budget.</p>
                                        </div>
                                        <div className="bg-gradient-to-br from-indigo-50 to-violet-50 p-8 rounded-3xl border border-indigo-100">
                                            <div className="w-14 h-14 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center text-2xl mb-5">
                                                <i className="fas fa-wand-magic-sparkles"></i>
                                            </div>
                                            <h3 className="font-display text-3xl font-black text-indigo-900 mb-1">Vape Matchmaker ✨</h3>
                                            <p className="text-indigo-400 text-sm font-medium mb-5">Tell us what flavours you enjoy and our AI will find your perfect in-store match.</p>
                                            <form onSubmit={handleVapeMatch} className="space-y-3">
                                                <input type="text" value={vapeInput} onChange={e => setVapeInput(e.target.value)}
                                                    placeholder="e.g. mango, mint, watermelon..." required
                                                    className="w-full p-4 border-2 border-indigo-100 focus:border-indigo-400 rounded-xl outline-none bg-white font-medium text-gray-700 placeholder-indigo-200 transition-colors" />
                                                <button type="submit" disabled={isVapeLoading}
                                                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-colors disabled:opacity-50 flex items-center justify-center gap-2">
                                                    {isVapeLoading
                                                        ? <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> Finding...</>
                                                        : "Find My Flavour →"}
                                                </button>
                                            </form>
                                            {vapeResult && (
                                                <div className="mt-4 p-4 bg-white/70 rounded-xl text-indigo-800 text-sm font-medium leading-relaxed border border-indigo-100">
                                                    <i className="fas fa-robot mr-2 text-indigo-400"></i>{vapeResult}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </section>
                            {/* REVIEWS */}
                            <section className="py-16 bg-gray-50 border-t border-gray-100 px-4">
                                <div className="max-w-7xl mx-auto">
                                    <div className="text-center mb-10">
                                        <h2 className="font-display text-4xl md:text-5xl font-black text-gray-900 mb-2">Trusted by Watford</h2>
                                        <div className="text-yellow-400 text-xl mb-1 tracking-wide">★★★★★</div>
                                        <p className="text-gray-400 font-medium text-sm">4.6 · Based on 46 real Google reviews</p>
                                    </div>
                                    <div className="grid md:grid-cols-3 gap-5 max-w-6xl mx-auto">
                                        {[
                                            { name: "Mansoor Ali",   initial: "M", col: "bg-orange-100 text-orange-700", time: "5 months ago",
                                              text: '"The shop where I had my phone repaired did a very good service. The owner AJ was very efficient and professional — I recommend him to others for great work."' },
                                            { name: "Kishan Roshni", initial: "K", col: "bg-amber-100 text-amber-700",   time: "3 months ago",
                                              text: '"Very quick and efficient. Excellent prices and would definitely recommend for great service!"' },
                                            { name: "Roderick C.",   initial: "R", col: "bg-yellow-100 text-yellow-700", time: "Local Guide",
                                              text: '"Helpful staff and they had the vape pods I needed in stock. The gentleman behind the counter made sure I got the right ones — friendly service, will be back."' }
                                        ].map(({ name, initial, col, time, text }, i) => (
                                            <div key={i} className="review-card bg-white p-7 rounded-2xl border border-gray-100 shadow-sm">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div className="flex items-center gap-3">
                                                        <div className={`w-10 h-10 ${col} rounded-full flex items-center justify-center font-black text-lg`}>{initial}</div>
                                                        <div>
                                                            <div className="font-bold text-gray-900 text-sm">{name}</div>
                                                            <div className="text-xs text-gray-400">{time}</div>
                                                        </div>
                                                    </div>
                                                    <i className="fab fa-google text-gray-300 text-lg"></i>
                                                </div>
                                                <div className="text-yellow-400 text-sm mb-3">★★★★★</div>
                                                <p className="text-gray-600 text-sm leading-relaxed font-medium">{text}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>
                            <FAQSection />
                            {/* MAP */}
                            <section className="py-16 bg-gray-50 border-t border-gray-100 px-4">
                                <div className="max-w-6xl mx-auto text-center">
                                    <h2 className="font-display text-4xl md:text-5xl font-black text-gray-900 mb-2">Find Us</h2>
                                    <p className="text-gray-400 font-medium mb-8">75, 75a The Parade, Watford WD17 1LN</p>
                                    <div className="h-[380px] rounded-3xl overflow-hidden shadow-xl border border-gray-200">
                                        <iframe src="https://maps.google.com/maps?q=Generation%20Z%20Mobile%20%26%20Vape,%2075%20The%20Parade,%20Watford%20WD17%201LN&t=&z=19&ie=UTF8&iwloc=&output=embed"
                                            className="w-full h-full border-0" allowFullScreen loading="lazy" referrerPolicy="no-referrer-when-downgrade" />
                                    </div>
                                </div>
                            </section>
                        </main>
                    )}
                    {view === 'booking' && (
                        <main className="py-12 bg-gray-50 flex-1 px-4">
                            <div className="max-w-7xl mx-auto">{renderFunnel()}</div>
                        </main>
                    )}
                    {view === 'sell' && (
                        <main className="py-12 bg-gray-50 flex-1 px-4">
                            <div className="max-w-7xl mx-auto">{renderSellPage()}</div>
                        </main>
                    )}
                    {view === 'shop' && (
                        <main className="py-12 bg-gray-50 flex-1 px-4">
                            <div className="max-w-7xl mx-auto">{renderShop()}</div>
                        </main>
                    )}
                    {view === 'checkout' && (
                        <main className="py-12 bg-gray-50 flex-1 px-4">
                            <div className="max-w-7xl mx-auto">{renderCheckout()}</div>
                        </main>
                    )}
                    {/* FOOTER */}
                    <footer className="bg-gray-900 text-white pt-16 pb-8">
                        <div className="max-w-7xl mx-auto px-4 grid md:grid-cols-3 gap-10 mb-12">
                            <div>
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="w-10 h-10 rounded-full border-2 border-brand-400 flex items-center justify-center"><span className="font-display text-sm font-black text-brand-400 leading-none tracking-tight">GZ</span></div>
                                    <span className="font-display text-2xl font-black">Generation <span className="text-brand-400">Z</span></span>
                                </div>
                                <p className="text-gray-400 text-sm font-medium leading-relaxed">Watford's most trusted phone repair shop. Fast, fair, and fully guaranteed.</p>
                            </div>
                            <div>
                                <h3 className="font-bold text-xs uppercase tracking-widest text-gray-500 mb-4">Contact</h3>
                                <p className="text-gray-400 text-sm mb-2 font-medium">75 The Parade, Watford WD17 1LN</p>
                                <a href={`tel:${SHOP_PHONE}`} className="text-white font-bold hover:text-brand-400 transition-colors flex items-center gap-2 text-sm">
                                    <i className="fas fa-phone text-brand-500 text-xs"></i> 07404 676738
                                </a>
                            </div>
                            <div>
                                <h3 className="font-bold text-xs uppercase tracking-widest text-gray-500 mb-4">Opening Hours</h3>
                                <div className="space-y-2 text-sm text-gray-400 font-medium">
                                    <p>Mon – Sat: 9:00 AM – 7:00 PM</p>
                                    <p>Sunday: 10:00 AM – 5:30 PM</p>
                                </div>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto px-4 border-t border-gray-800 pt-8 text-center text-gray-600 text-xs font-medium leading-relaxed">
                            <p className="mb-2">
                                <strong className="text-gray-500">Services:</strong> iPhone Screen Repair · Samsung Battery Replacement · iPad Repairs · Water Damage · Charging Port Fix · Buy Refurbished Phones · Cash for Phones · Device Trade-In · Premium Vapes
                            </p>
                            <p className="mb-4">
                                <strong className="text-gray-500">Areas Served:</strong> Watford · Bushey · Rickmansworth · Croxley Green · Garston · Hertfordshire
                            </p>
                            <p>&copy; 2026 Generation Z Mobile & Vape. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
